<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataAArch · Sign in</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9f3e8 0%, #f0eaf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #1a2b3c;
        }

        .login-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        /* ----- MAIN CARD (using theme's .info-card style) ----- */
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 0;
            background: linear-gradient(145deg, #ffffff, #fcf8f2);
            box-shadow: 0 30px 50px -20px #6f4e37, 0 0 0 1px #ffe7c4 inset;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* ----- LEFT PANEL (brand) ----- */
        .brand-panel {
            flex: 1;
            background: linear-gradient(165deg, #003057, #1b4b7a, #c94b4b);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            color: white;
            position: relative;
            isolation: isolate;
        }

        .brand-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .brand-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            font-size: 3.2rem;
            color: #ffdbbf;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
        }

        .logo-text h1 {
            font-weight: 800;
            font-size: 2.4rem;
            letter-spacing: -0.5px;
            color: white;
            line-height: 1.1;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo-text span {
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 500;
            color: #ffdbbf;
        }

        .tagline {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 2rem;
            max-width: 300px;
            background: linear-gradient(145deg, #ffffff, #ffdbbf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .feature-list {
            list-style: none;
            margin-top: auto;
        }

        .feature-list li {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 1.2rem;
            font-weight: 600;
            color: #f0e3d0;
        }

        .feature-list i {
            color: #ffb56b;
            font-size: 1.3rem;
            width: 28px;
        }

        /* ----- RIGHT PANEL (form) ----- */
        .form-panel {
            flex: 1;
            padding: 3rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 2.2rem;
        }

        .form-header h2 {
            font-weight: 800;
            font-size: 2.4rem;
            background: linear-gradient(145deg, #c94545, #b2569b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .form-header p {
            color: #7b5e4a;
            font-weight: 500;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            color: #b45f4a;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: #fff5e8;
            border: 2px solid #ffcfaa;
            border-radius: 40px;
            padding: 0.1rem 1.5rem;
            transition: all 0.2s ease;
        }

        .input-field:focus-within {
            border-color: #f58231;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(245,130,49,0.15);
        }

        .input-field i {
            color: #c3976f;
            font-size: 1.2rem;
            width: 28px;
        }

        .input-field input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            padding: 1rem 0;
            outline: none;
            font-family: 'Inter', sans-serif;
            color: #1e3f5c;
        }

        .input-field input::placeholder {
            color: #d4af8c;
            font-weight: 400;
        }

        .toggle-password {
            cursor: pointer;
            color: #c3976f;
            margin-left: auto;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0 2.5rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            color: #5f4a38;
            cursor: pointer;
        }

        .remember input {
            accent-color: #f2845c;
            width: 18px;
            height: 18px;
        }

        .forgot-link {
            font-weight: 700;
            color: #c94b4b;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .forgot-link:hover {
            border-bottom-color: #c94b4b;
        }

        .login-btn {
            background: linear-gradient(145deg, #f2845c, #d64f4f);
            border: none;
            border-radius: 60px;
            padding: 1.2rem;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 15px 25px -8px #d64f4f;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .login-btn:hover {
            background: linear-gradient(145deg, #f57e50, #e05555);
            transform: scale(1.02);
            box-shadow: 0 20px 30px -8px #b64949;
        }

        .signup-prompt {
            text-align: center;
            margin-top: 2rem;
            color: #7b5e4a;
            font-weight: 600;
        }

        .signup-prompt a {
            color: #f2845c;
            font-weight: 800;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .signup-prompt a:hover {
            border-bottom-color: #f2845c;
        }

        hr {
            border: none;
            border-top: 2px dashed #ffc6a0;
            margin: 2rem 0 1.2rem;
        }

        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9f8a78;
        }

        .security-note i {
            color: #f2845c;
        }

        /* responsiveness */
        @media (max-width: 850px) {
            .login-card {
                flex-direction: column;
            }
            .brand-panel {
                padding: 2.5rem;
            }
        }
        @media (max-width: 500px) {
            .form-panel {
                padding: 2rem 1.5rem;
            }
            .logo-text h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- LEFT: themed brand panel -->
            <div class="brand-panel">
                <div class="brand-content">
                    <div class="logo-area">
                        <i class="fas fa-database logo-icon"></i>
                        <div class="logo-text">
                            <h1>DataAArch</h1>
                            <span>intelligent archive</span>
                        </div>
                    </div>
                    <div class="tagline">
                        Secure. Compliant. Fast.
                    </div>
                    <ul class="feature-list">
                        <li><i class="fas fa-shield-alt"></i> Regulatory compliance ready</li>
                        <li><i class="fas fa-bolt"></i> Boost core banking performance</li>
                        <li><i class="fas fa-coins"></i> Reduce storage costs by ~40%</li>
                    </ul>
                </div>
            </div>

            <!-- RIGHT: login form (themed) -->
            <div class="form-panel">
                <div class="form-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to your archive console</p>
                </div>

                <form id="loginForm" onsubmit="event.preventDefault(); fakeLogin();">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <div class="input-field">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="admin@bank.com" value="demo@dataaarch.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="········" value="demo123" required>
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember">
                            <input type="checkbox" checked> Keep me signed in
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn"><i class="fas fa-arrow-right-to-bracket"></i> Sign in</button>

                    <p class="signup-prompt">
                        New administrator? <a href="#">Request access</a>
                    </p>
                    <hr>
                    <div class="security-note">
                        <i class="fas fa-lock"></i> <span>256‑bit encrypted</span>
                        <i class="fas fa-check-circle"></i> <span>ISO 27001 certified</span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Demo login
        function fakeLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email && password) {
                alert(`Demo login: Welcome ${email}\n(redirect to dashboard in production)`);
                // window.location.href = "dashboard.html";
            } else {
                alert('Please enter email and password');
            }
        }
    </script>
</body>
</html>
